name: Package Artifacts

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # ─── macOS 构建 ───────────────────────────────────
  package-mac:
    name: Build macOS (${{ matrix.arch }} DMG)
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        arch: [x64, arm64]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build macOS DMG
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"
          ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
          ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
          ELECTRON_BUILDER_ALLOW_HARD_LINKS: "false"
        run: npm run pack:mac:${{ matrix.arch }}

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-ai-cut-macos-${{ matrix.arch }}-dmg
          path: release/**/*.dmg
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*.dmg

  # ─── Windows 构建 ─────────────────────────────────
  package-win:
    name: Build Windows (x64 NSIS)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows NSIS
        env:
          ELECTRON_MIRROR: "https://npmmirror.com/mirrors/electron/"
          ELECTRON_BUILDER_BINARIES_MIRROR: "https://npmmirror.com/mirrors/electron-builder-binaries/"
          ELECTRON_BUILDER_ALLOW_HARD_LINKS: "false"
        run: npm run pack:win:x64

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-ai-cut-windows-x64-nsis
          path: release/**/*Setup*.exe
          if-no-files-found: error

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: release/**/*Setup*.exe
